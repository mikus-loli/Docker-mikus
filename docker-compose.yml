version: "3.8"

services:
  mikus:
    image: ghcr.io/${GITHUB_USER:-your-username}/mikus:latest
    build: .
    container_name: mikus
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mikus-data:/app/data
      - mikus-stacks:/opt/stacks
    environment:
      - PORT=3001
      - DOCKER_SOCKET=/var/run/docker.sock
      - STACKS_DIR=/opt/stacks
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    labels:
      - "com.mikus.managed=true"

volumes:
  mikus-data:
    driver: local
  mikus-stacks:
    driver: local
